<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin Noguier Floating Paper Gallery</title>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
    body {
        overflow: hidden;
    }

    .n {
        position: absolute;
        top: 100px;
        width: 200px;
        height: 10px;
        background: #000;
    }

    .n1 {
        top: 200px
    }

    .n2 {
        top: 300px
    }

    .n3 {
        top: 400px
    }

    .n4 {
        top: 500px
    }

    .block {
        height: 100px;
        width: 100px;
        background-color: red;
        position: absolute;
        z-index: 100;
    }
    #container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        pointer-events: none;
    }
    ul {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 100;
        border: 1px solid #000;
        width: 200px;
        list-style: none;
        margin: 0;
        padding: 0;
    }
    li {
        font-size: 50px;
        border: 1px solid #000;
    }
</style>

<body>
    <ul class="nav">
        <li data-nav="0">111</li>
        <li data-nav="1">22</li>
        <li data-nav="2">33</li>
        <li data-nav="3">44</li>
        <li data-nav="4">55</li>
    </ul>
    <div id="wrap">
        <div class="n"><img src="/img/1.jpg" width="60"></img></div>
        <div class="n n1"><img src="/img/2.jpg" width="60"></img></div>
        <div class="n n2"><img src="/img/3.jpg" width="60"></img></div>
        <div class="n n3"><img src="/img/4.jpg" width="60"></img></div>
        <div class="n n4"><img src="/img/5.jpg" width="60"></img></div>
    </div>

    <div id="block" class="block"></div>
    <div id="container"></div>
</body>

<script src="module.js" type="module"></script>
<script src="app.js" type="module"></script>

</html>
